<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuilder — Собери свой компьютер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b0b;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #0f0f0f;
            border-bottom: 1px solid #1e1e1e;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .header .logo span {
            color: #3b82f6;
        }
        .header .right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .header .country-btn {
            background: #1a1a1a;
            border: none;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .header .country-btn.active {
            background: #2a2a2a;
            color: #fff;
        }
        .header .country-btn:hover {
            background: #2a2a2a;
        }
        .header .auth-btn {
            background: #3b82f6;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .header .auth-btn:hover {
            background: #2563eb;
        }

        /* ===== ЛЕЙАУТ ===== */
        .layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        /* ===== САЙДБАР ===== */
        .sidebar {
            width: 250px;
            background: #111;
            padding: 16px 12px;
            border-right: 1px solid #1e1e1e;
            flex-shrink: 0;
            height: calc(100vh - 64px);
            overflow-y: auto;
            position: sticky;
            top: 64px;
        }
        .sidebar .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 2px;
            padding: 0 12px;
            margin-bottom: 12px;
        }
        .sidebar .category {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2px;
            width: 100%;
            background: transparent;
            border: none;
            font-family: inherit;
            text-align: left;
        }
        .sidebar .category:hover {
            background: #1c1c1c;
            color: #fff;
        }
        .sidebar .category.active {
            background: #1c1c1c;
            color: #fff;
            border-left: 3px solid #3b82f6;
        }
        .sidebar .category .cat-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .category .cat-left svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .sidebar .category .cat-left svg path {
            fill: #666;
            transition: 0.2s;
        }
        .sidebar .category.active .cat-left svg path {
            fill: #3b82f6;
        }
        .sidebar .category:hover .cat-left svg path {
            fill: #aaa;
        }
        .sidebar .category .count {
            background: #1a1a1a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #666;
        }
        .sidebar .category.active .count {
            background: #2a2a2a;
            color: #aaa;
        }
        .sidebar .divider {
            border-top: 1px solid #1e1e1e;
            margin: 10px 0;
        }
        .sidebar .back-btn {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #aaa;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            margin-top: 16px;
            transition: 0.2s;
        }
        .sidebar .back-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* ===== СТАТИСТИКА В САЙДБАРЕ ===== */
        .build-stats {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }
        .build-stats h4 {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .build-stats .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 14px;
        }
        .build-stats .stat:last-child {
            border-bottom: none;
        }
        .build-stats .stat .label {
            color: #888;
        }
        .build-stats .stat .value {
            color: #22c55e;
            font-weight: 600;
        }
        .build-stats .save-btn {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: #fff;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 12px;
            transition: 0.2s;
        }
        .build-stats .save-btn:hover {
            background: #16a34a;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: calc(100vh - 64px);
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .top-bar h2 {
            font-size: 24px;
            font-weight: 600;
        }
        .top-bar h2 small {
            font-weight: 400;
            color: #666;
            font-size: 15px;
            margin-left: 10px;
        }
        .top-bar .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .top-bar .controls select,
        .top-bar .controls input {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #ddd;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .top-bar .controls select:focus,
        .top-bar .controls input:focus {
            border-color: #3b82f6;
        }
        .top-bar .controls input {
            width: 200px;
        }
        .top-bar .controls input::placeholder {
            color: #555;
        }

        /* ===== 3D КАНВАС ===== */
        .canvas-wrap {
            background: #0a0a0a;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            height: 380px;
            position: relative;
            margin-bottom: 16px;
        }
        .canvas-wrap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .canvas-wrap .canvas-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: #666;
            pointer-events: none;
        }

        /* ===== СОВМЕСТИМОСТЬ ===== */
        .compat-box {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .compat-box.ok {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .compat-box.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .compat-box .line {
            padding: 3px 0;
        }

        /* ===== FPS СЕКЦИЯ ===== */
        .fps-section {
            display: none;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .fps-section.open {
            display: block;
        }
        .fps-section h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #fff;
        }
        .fps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }
        .fps-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #2a2a2a;
        }
        .fps-card .game {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
            color: #3b82f6;
        }
        .fps-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 3px 0;
            color: #999;
        }
        .fps-card .row .val {
            color: #22c55e;
            font-weight: 600;
        }

        /* ===== СЕТКА ТОВАРОВ ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }
        .card {
            background: #141414;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #1c1c1c;
            transition: 0.2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: #3b82f6;
            background: #181818;
            transform: translateY(-3px);
        }
        .card .card-img {
            width: 100%;
            height: 130px;
            background: #0a0a0a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 50px;
            color: #333;
        }
        .card .card-img svg {
            width: 64px;
            height: 64px;
        }
        .card .card-name {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .card-shop {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }
        .card .card-price {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .card .card-price .new {
            font-weight: 700;
            font-size: 18px;
            color: #22c55e;
        }
        .card .card-price .old {
            font-size: 14px;
            color: #666;
            text-decoration: line-through;
        }
        .card .card-rating {
            font-size: 13px;
            color: #facc15;
            margin-top: 4px;
        }
        .card .card-btns {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }
        .card .card-btns button {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-weight: 500;
        }
        .card .card-btns .btn-add {
            background: #1f1f1f;
            color: #fff;
        }
        .card .card-btns .btn-add:hover {
            background: #3b82f6;
        }
        .card .card-btns .btn-add.selected {
            background: #3b82f6;
        }
        .card .card-btns .btn-detail {
            background: #2a2a2a;
            color: #aaa;
        }
        .card .card-btns .btn-detail:hover {
            background: #3a3a3a;
            color: #fff;
        }

        /* ===== МОДАЛ ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #181818;
            border-radius: 24px;
            max-width: 520px;
            width: 100%;
            padding: 32px;
            border: 1px solid #2a2a2a;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
            font-family: inherit;
        }
        .modal .modal-close:hover {
            color: #fff;
        }
        .modal .modal-img {
            width: 100%;
            height: 160px;
            background: #0a0a0a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: #333;
            margin-bottom: 16px;
        }
        .modal .modal-title {
            font-size: 22px;
            font-weight: 600;
        }
        .modal .modal-shop {
            color: #888;
            font-size: 14px;
        }
        .modal .modal-price {
            font-size: 28px;
            font-weight: 700;
            color: #22c55e;
            margin: 8px 0 4px;
        }
        .modal .modal-price-old {
            font-size: 18px;
            color: #666;
            text-decoration: line-through;
        }
        .modal .modal-rating {
            color: #facc15;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .modal .modal-specs {
            background: #111;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }
        .modal .modal-specs .spec {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 14px;
        }
        .modal .modal-specs .spec:last-child {
            border-bottom: none;
        }
        .modal .modal-specs .spec .key {
            color: #888;
        }
        .modal .modal-specs .spec .value {
            color: #fff;
        }
        .modal .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .modal .modal-btns .btn-buy {
            background: #facc15;
            color: #000;
        }
        .modal .modal-btns .btn-buy:hover {
            background: #eab308;
        }
        .modal .modal-btns .btn-add-modal {
            background: #1f1f1f;
            color: #fff;
        }
        .modal .modal-btns .btn-add-modal:hover {
            background: #3b82f6;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main {
                padding: 16px;
                height: auto;
            }
            .header {
                padding: 10px 16px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .canvas-wrap {
                height: 250px;
            }
            .top-bar .controls input {
                width: 140px;
            }
            .modal {
                padding: 20px;
            }
        }
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .fps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="logo">PC<span>Builder</span></div>
        <div class="right">
            <button class="country-btn active" data-country="RU" onclick="setCountry('RU')">🇷🇺 Россия / ₽</button>
            <button class="country-btn" data-country="BY" onclick="setCountry('BY')">🇧🇾 Беларусь / Br</button>
            <button class="auth-btn" id="authBtn">Войти</button>
        </div>
    </header>

    <!-- ===== ЛЕЙАУТ ===== -->
    <div class="layout">

        <!-- ===== САЙДБАР ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Категории</div>
            <div id="categoriesContainer"></div>

            <button class="back-btn" onclick="location.reload()">← На главную</button>

            <div class="build-stats">
                <h4>Ваша сборка</h4>
                <div class="stat">
                    <span class="label">Стоимость</span>
                    <span class="value" id="totalPrice">0 ₽</span>
                </div>
                <div class="stat">
                    <span class="label">Мощность</span>
                    <span class="value" id="totalPower">0 W</span>
                </div>
                <div class="stat">
                    <span class="label">Компонентов</span>
                    <span class="value" id="totalCount">0 / 12</span>
                </div>
                <button class="save-btn" onclick="saveBuild()">💾 Сохранить сборку</button>
            </div>
        </aside>

        <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
        <main class="main" id="main">

            <!-- Верхняя панель -->
            <div class="top-bar">
                <h2 id="categoryTitle">Процессоры <small>для России</small></h2>
                <div class="controls">
                    <input type="text" id="searchInput" placeholder="Поиск..." oninput="filterProducts()">
                    <select id="sortSelect" onchange="filterProducts()">
                        <option value="default">По умолчанию</option>
                        <option value="price-asc">Сначала дешёвые</option>
                        <option value="price-desc">Сначала дорогие</option>
                        <option value="rating">По рейтингу</option>
                    </select>
                    <button class="country-btn" onclick="toggleFPS()" style="background:#1a1a1a;border:none;color:#aaa;padding:8px 16px;border-radius:30px;cursor:pointer;font-family:inherit;">📊 FPS</button>
                </div>
            </div>

            <!-- 3D Канвас -->
            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="canvas3d"></canvas>
                <div class="canvas-hint">🖱️ Вращай мышью · 🔄 Скролл для зума</div>
            </div>

            <!-- Совместимость -->
            <div class="compat-box" id="compatBox"></div>

            <!-- FPS Секция -->
            <div class="fps-section" id="fpsSection">
                <h3>🎮 Тест производительности</h3>
                <div class="fps-grid" id="fpsGrid"></div>
            </div>

            <!-- Сетка товаров -->
            <div class="grid" id="productsGrid"></div>

        </main>

    </div>

    <!-- ===== МОДАЛ ===== -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img" id="modalImg">🖥️</div>
            <div class="modal-title" id="modalTitle">Название</div>
            <div class="modal-shop" id="modalShop">Магазин</div>
            <div class="modal-price" id="modalPrice">0 ₽</div>
            <div class="modal-price-old" id="modalPriceOld"></div>
            <div class="modal-rating" id="modalRating">⭐ 0.0</div>
            <div class="modal-specs" id="modalSpecs"></div>
            <div class="modal-btns">
                <button class="btn-add-modal" id="modalAddBtn">➕ Добавить</button>
                <button class="btn-buy" id="modalBuyBtn">🛒 Купить</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        // ============================================================
        // 1. ИКОНКИ ДЛЯ КАТЕГОРИЙ (SVG)
        // ============================================================

        const CAT_ICONS = {
            CPU: `<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="7" y="7" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="8" x2="4" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="16" x2="4" y2="16" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="8" x2="22" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1.5"/></svg>`,

        // ============================================================

        // ============================================================

        const FPS_DATA = {
            'Cyberpunk 2077': { '1080p': { medium: 120, ultra: 85 }, '1440p': { medium: 95, ultra: 60 },
            '4K': { medium: 55, ultra: 35 } },
            'Fortnite': { '1080p': { medium: 240, ultra: 180 }, '1440p': { medium: 180, ultra: 144 },
            '4K': { medium: 90, ultra: 60 } },

            '4K': { medium: 120, ultra: 80 } },

            '4K': { medium: 160, ultra: 110 } },

        // ============================================================
        // 4. СОСТОЯНИЕ

        let state = {

            category: 'CPU',

        };

        let scene, camera, renderer, pcGroup;

        // ============================================================
        // 5. ОСНОВНЫЕ ФУНКЦИИ
        // ============================================================

        function getSymbol() {
            return state.country === 'RU' ? '₽' : 'Br';
        }

        function getCategoryName(cat) {
            const names = {
                CPU: 'Процессоры',
                GPU: 'Видеокарты',
                RAM: 'Оперативная память',
                'Материнская плата': 'Материнские платы',
                Охлаждение: 'Охлаждение',
                SSD: 'SSD накопители',
                HDD: 'HDD накопители',
                БП: 'Блоки питания',
                Корпус: 'Корпуса',
                Монитор: 'Мониторы',
                Клавиатура: 'Клавиатуры',
                Мышь: 'Мыши'
            };
            return names[cat] || cat;
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            const catList = Object.keys(PRODUCTS);

            container.innerHTML = catList.map(cat => {
                const count = PRODUCTS[cat].length;
                const active = cat === state.category ? 'active' : '';
                const icon = CAT_ICONS[cat] || '📦';
                return `
                    <button class="category ${active}" onclick="selectCategory('${cat}')">
                        <span class="cat-left">
                            <span>${icon}</span>
                            ${cat}
                        </span>
                        <span class="count">${count}</span>
                    </button>
                `;
            }).join('');
        }

        function selectCategory(cat) {
            state.category = cat;
            renderCategories();
            renderProducts();
            updateTitle();
            updateCompatibility();
            update3D();
        }

        function updateTitle() {
            const name = getCategoryName(state.category);
            document.getElementById('categoryTitle').innerHTML =
                `${name} <small>для ${state.country === 'RU' ? 'России' : 'Беларуси'}</small>`;
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const products = PRODUCTS[state.category] || [];
            const symbol = getSymbol();

            let filtered = [...products];
            if (state.search) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(state.search.toLowerCase()));
            }
            if (state.sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
            else if (state.sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
            else if (state.sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);

            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;color:#666;padding:40px;">Нет товаров в этой категории</div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, idx) => {
                const isSelected = state.selected[state.category] === idx;
                const emoji = getCategoryEmoji(state.category);
                return `
                    <div class="card" onclick="openModal('${state.category}', ${idx})">
                        <div class="card-img">${emoji}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-shop">${p.shop}</div>
                        <div class="card-price">
                            <span class="new">${p.price.toLocaleString('ru-RU')} ${symbol}</span>
                            ${p.oldPrice ? `<span class="old">${p.oldPrice.toLocaleString('ru-RU')}</span>` : ''}
                        </div>
                        <div class="card-rating">⭐ ${p.rating.toFixed(1)}</div>
                        <div class="card-btns">
                            <button class="btn-add ${isSelected ? 'selected' : ''}" onclick="event.stopPropagation(); toggleSelect('${state.category}', ${idx})">
                                ${isSelected ? '✓ Выбран' : '➕ Добавить'}
                            </button>
                            <button class="btn-detail" onclick="event.stopPropagation(); openModal('${state.category}', ${idx})">
                                📋 Детали
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getCategoryEmoji(cat) {
            const emojis = {
                CPU: '🖥️',
                GPU: '🎮',
                RAM: '💾',
                'Материнская плата': '⚡',
                Охлаждение: '❄️',
                SSD: '📀',
                HDD: '💿',
                БП: '⚙️',
                Корпус: '🖤',
                Монитор: '🖥️',
                Клавиатура: '⌨️',
                Мышь: '🖱️'
            };
            return emojis[cat] || '📦';
        }

        function toggleSelect(cat, idx) {
            const products = PRODUCTS[cat] || [];
            if (state.selected[cat] === idx) {
                delete state.selected[cat];
            } else {
                state.selected[cat] = idx;
            }
            renderProducts();
            updateStats();
            updateCompatibility();
            update3D();
        }

        function filterProducts() {
            state.search = document.getElementById('searchInput').value;
            state.sort = document.getElementById('sortSelect').value;
            renderProducts();
        }

        // ============================================================
        // 6. СТАТИСТИКА
        // ============================================================

        function updateStats() {
            const symbol = getSymbol();
            let totalPrice = 0;
            let totalPower = 0;
            let count = 0;

            for (const [cat, idx] of Object.entries(state.selected)) {
                const products = PRODUCTS[cat] || [];
                const p = products[idx];
                if (p) {
                    totalPrice += p.price;
                    count++;
                    if (p.specs && p.specs.TDP) {
                        const tdp = parseInt(p.specs.TDP);
                        if (!isNaN(tdp)) totalPower += tdp;
                    }
                }
            }

            document.getElementById('totalPrice').textContent = totalPrice.toLocaleString('ru-RU') + ' ' + symbol;
            document.getElementById('totalPower').textContent = totalPower + ' W';
            document.getElementById('totalCount').textContent = count + ' / 12';
        }

        // ============================================================
        // 7. СОВМЕСТИМОСТЬ
        // ============================================================

        function updateCompatibility() {
            const box = document.getElementById('compatBox');
            const errors = [];

            // Проверка сокета CPU и материнской платы
            const cpuIdx = state.selected['CPU'];
            const moboIdx = state.selected['Материнская плата'];

            if (cpuIdx !== undefined && moboIdx !== undefined) {
                const cpu = PRODUCTS.CPU[cpuIdx];
                const mobo = PRODUCTS['Материнская плата'][moboIdx];
                if (cpu && mobo) {
                    const cpuSocket = cpu.specs?.Сокет || '';
                    const moboSocket = mobo.specs?.Сокет || '';
                    if (cpuSocket && moboSocket && cpuSocket !== moboSocket) {
                        errors.push(`❌ Сокет CPU (${cpuSocket}) не совместим с материнской платой (${moboSocket})`);
                    }
                    const cpuTdp = parseInt(cpu.specs?.TDP) || 0;
                    // Проверка TDP с охлаждением
                }
            }

            // Проверка мощности БП
            const psuIdx = state.selected['БП'];
            let totalTdp = 0;
            for (const [cat, idx] of Object.entries(state.selected)) {
                const products = PRODUCTS[cat] || [];
                const p = products[idx];
                if (p && p.specs?.TDP) {
                    const tdp = parseInt(p.specs.TDP);
                    if (!isNaN(tdp)) totalTdp += tdp;
                }
            }

            if (psuIdx !== undefined && totalTdp > 0) {
                const psu = PRODUCTS['БП'][psuIdx];
                if (psu) {
                    const psuPower = parseInt(psu.specs?.Мощность) || 0;
                    if (totalTdp > psuPower * 0.8) {
                        errors.push(`⚠️ БП (${psuPower}W) может быть недостаточным для компонентов (${Math.round(totalTdp * 1.2)}W с запасом)`);
                    }
                }
            }

            if (errors.length === 0 && Object.keys(state.selected).length > 0) {
                box.className = 'compat-box ok';
                box.innerHTML = '✅ Все компоненты совместимы!';
            } else if (errors.length > 0) {
                box.className = 'compat-box error';
                box.innerHTML = errors.map(e => `<div class="line">${e}</div>`).join('');
            } else {
                box.className = 'compat-box';
                box.style.display = 'none';
            }
            box.style.display = errors.length > 0 || Object.keys(state.selected).length > 0 ? 'block' : 'none';
        }

        // ============================================================
        // 8. FPS
        // ============================================================

        function toggleFPS() {
            state.fpsOpen = !state.fpsOpen;
            const section = document.getElementById('fpsSection');
            section.classList.toggle('open', state.fpsOpen);
            if (state.fpsOpen) renderFPS();

        function renderFPS() {
            const grid = document.getElementById('fpsGrid');
            grid.innerHTML = Object.entries(FPS_DATA).map(([game, data]) => `
                <div class="fps-card">
                    <div class="game">${game}</div>
                    <div class="row"><span>1080p Medium</span><span class="val">${data['1080p'].medium} FPS</span></div>
                    <div class="row"><span>1080p Ultra</span><span class="val">${data['1080p'].ultra} FPS</span></div>
                    <div class="row"><span>1440p Ultra</span><span class="val">${data['1440p'].ultra} FPS</span></div>
                    <div class="row"><span>4K Ultra</span><span class="val">${data['4K'].ultra} FPS</span></div>
                </div>
            `).join('');

        // ============================================================
        // 9. МОДАЛ
        // ============================================================

        function openModal(cat, idx) {
            const products = PRODUCTS[cat] || [];
            const p = products[idx];
            if (!p) return;

            const symbol = getSymbol();
            const emoji = getCategoryEmoji(cat);

            document.getElementById('modalImg').textContent = emoji;

                symbol : '';

            const specsContainer = document.getElementById('modalSpecs');

                specsContainer.innerHTML = Object.entries(p.specs).map(([key, val]) => `
                    <div class="spec"><span class="key">${key}</span><span class="value">${val}</span></div>
                `).join('');

                specsContainer.innerHTML =
                    `<div class="spec"><span class="key">Нет данных</span><span class="value">—</span></div>`;
            }

            document.getElementById('modalAddBtn').onclick = function() {
                toggleSelect(cat, idx);

            document.getElementById('modalBuyBtn').onclick = function() {
                window.open('https://www.ozon.ru/search/?text=' + encodeURIComponent(p.name), '_blank');

            document.getElementById('modal').classList.remove('open');

        // ============================================================
        // 10. СТРАНА
        // ============================================================

        function setCountry(country) {
            state.country = country;
            document.querySelectorAll('.country-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.country === country);
            });
            updateTitle();
            renderProducts();
            updateStats();

        // ============================================================
        // 11. СОХРАНЕНИЕ
        // ============================================================

        function saveBuild() {
            if (Object.keys(state.selected).length === 0) {
                alert('❌ Добавьте хотя бы один компонент!');
                return;
            }
            const name = prompt('Название сборки:', 'Моя сборка ' + new Date().toLocaleDateString('ru-RU'));
            if (name) {
                const builds = JSON.parse(localStorage.getItem('pcbuilder_saves') || '[]');
                builds.push({
                    id: Date.now(),
                    name: name,
                    components: { ...state.selected },
                    price: parseInt(document.getElementById('totalPrice').textContent.replace(/[^\d]/g, '')),
                    date: new Date().toISOString()
                });
                localStorage.setItem('pcbuilder_saves', JSON.stringify(builds));
                alert('✅ Сборка "' + name + '" сохранена!');
            }
        }

        // ============================================================
        // 12. 3D
        // ============================================================

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            const wrap = document.getElementById('canvasWrap');
            const w = wrap.clientWidth;
            const h = wrap.clientHeight || 380;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
            camera.position.set(2, 1.8, 3.5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Свет
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(5, 8, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x3b82f6, 0.3);
            fillLight.position.set(-3, 2, -3);
            scene.add(fillLight);

            // Пол
            const planeGeo = new THREE.PlaneGeometry(10, 10);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.3 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.6;
            plane.receiveShadow = true;
            scene.add(plane);

            pcGroup = new THREE.Group();
            scene.add(pcGroup);

            build3D();
            animate3D();

            // Resize
            window.addEventListener('resize', () => {
                const w2 = wrap.clientWidth;
                const h2 = wrap.clientHeight || 380;
                camera.aspect = w2 / h2;
                camera.updateProjectionMatrix();
                renderer.setSize(w2, h2);
            });

            // Mouse drag
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            let rotation = { x: 0, y: 0 };

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                prevMouse.x = e.clientX;
                prevMouse.y = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                rotation.y += dx * 0.01;
                rotation.x += dy * 0.01;
                rotation.x = Math.max(-0.5, Math.min(0.5, rotation.x));
                prevMouse.x = e.clientX;
                prevMouse.y = e.clientY;
                if (pcGroup) {
                    pcGroup.rotation.y = rotation.y;
                    pcGroup.rotation.x = rotation.x;
                }
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            // Zoom
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoom = e.deltaY * 0.001;
                camera.position.z += zoom;
                camera.position.z = Math.max(1.5, Math.min(6, camera.position.z));
            }, { passive: false });
        }

        function build3D() {
            while (pcGroup.children.length) pcGroup.remove(pcGroup.children[0]);

            // Корпус
            const caseMat = new THREE.MeshPhysicalMaterial({
                color: 0x222222,
                metalness: 0.2,
                roughness: 0.7,
                transparent: true,
                opacity: 0.95,
            });
            const caseGeo = new THREE.BoxGeometry(0.45, 1.2, 0.85);
            const caseMesh = new THREE.Mesh(caseGeo, caseMat);
            caseMesh.castShadow = true;
            caseMesh.receiveShadow = true;
            pcGroup.add(caseMesh);

            // Стекло
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x88ccff,
                metalness: 0.0,
                roughness: 0.05,
                transparent: true,
                opacity: 0.15,
            });
            const glassGeo = new THREE.BoxGeometry(0.44, 1.15, 0.02);
            const glassMesh = new THREE.Mesh(glassGeo, glassMat);
            glassMesh.position.z = 0.43;
            pcGroup.add(glassMesh);

            // Материнская плата
            const moboMat = new THREE.MeshPhysicalMaterial({ color: 0x1a5a2a, metalness: 0.3, roughness: 0.6 });
            const moboGeo = new THREE.BoxGeometry(0.38, 0.9, 0.03);
            const moboMesh = new THREE.Mesh(moboGeo, moboMat);
            moboMesh.position.set(0, 0.1, 0.1);
            pcGroup.add(moboMesh);

            // CPU
            if (state.selected.CPU !== undefined) {
                const cpuMat = new THREE.MeshPhysicalMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 });
                const cpuGeo = new THREE.BoxGeometry(0.08, 0.02, 0.08);
                const cpuMesh = new THREE.Mesh(cpuGeo, cpuMat);
                cpuMesh.position.set(0, 0.55, 0.12);
                pcGroup.add(cpuMesh);
            }

            // GPU
            if (state.selected.GPU !== undefined) {
                const gpuMat = new THREE.MeshPhysicalMaterial({ color: 0xcc3333, metalness: 0.7, roughness: 0.3 });
                const gpuGeo = new THREE.BoxGeometry(0.06, 0.12, 0.35);
                const gpuMesh = new THREE.Mesh(gpuGeo, gpuMat);
                gpuMesh.position.set(-0.1, 0.1, 0.18);
                pcGroup.add(gpuMesh);

                // Вентиляторы GPU
                const fanMat = new THREE.MeshPhysicalMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.8 });
                for (let i = -1; i <= 1; i++) {
                    const fanGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.01, 16);
                    const fan = new THREE.Mesh(fanGeo, fanMat);
                    fan.position.set(-0.1 + i * 0.04, 0.04, 0.18);
                    fan.rotation.x = Math.PI / 2;
                    pcGroup.add(fan);
                }
            }

            // RAM
            if (state.selected.RAM !== undefined) {
                const ramMat = new THREE.MeshPhysicalMaterial({ color: 0x00ccff, metalness: 0.2, roughness: 0.3 });
                for (let i = -1; i <= 1; i += 2) {
                    const ramGeo = new THREE.BoxGeometry(0.02, 0.07, 0.12);
                    const ram = new THREE.Mesh(ramGeo, ramMat);
                    ram.position.set(0.12, 0.25, i * 0.06);
                    pcGroup.add(ram);
                }
            }

            // Охлаждение (кулер на CPU)
            if (state.selected.Охлаждение !== undefined) {
                const coolMat = new THREE.MeshPhysicalMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.5 });
                const coolGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.06, 24);
                const cool = new THREE.Mesh(coolGeo, coolMat);
                cool.position.set(0, 0.62, 0.12);
                pcGroup.add(cool);

                // Радиатор
                const radMat = new THREE.MeshPhysicalMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.4 });
                for (let i = -2; i <= 2; i++) {
                    const finGeo = new THREE.BoxGeometry(0.12, 0.02, 0.01);
                    const fin = new THREE.Mesh(finGeo, radMat);
                    fin.position.set(0, 0.58 + i * 0.015, 0.12);
                    pcGroup.add(fin);
                }
            }

            // Блок питания
            if (state.selected.БП !== undefined) {
                const psuMat = new THREE.MeshPhysicalMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.5 });
                const psuGeo = new THREE.BoxGeometry(0.15, 0.08, 0.2);
                const psu = new THREE.Mesh(psuGeo, psuMat);
                psu.position.set(0, -0.45, 0.2);
                pcGroup.add(psu);
            }

            // SSD
            if (state.selected.SSD !== undefined) {
                const ssdMat = new THREE.MeshPhysicalMaterial({ color: 0x00aa66, metalness: 0.3, roughness: 0.5 });
                const ssdGeo = new THREE.BoxGeometry(0.12, 0.02, 0.06);
                const ssd = new THREE.Mesh(ssdGeo, ssdMat);
                ssd.position.set(0.15, -0.2, 0.12);
                pcGroup.add(ssd);
            }

            // HDD
            if (state.selected.HDD !== undefined) {
                const hddMat = new THREE.MeshPhysicalMaterial({ color: 0x444466, metalness: 0.6, roughness: 0.5 });
                const hddGeo = new THREE.BoxGeometry(0.12, 0.03, 0.12);
                const hdd = new THREE.Mesh(hddGeo, hddMat);
                hdd.position.set(0.15, -0.35, 0.12);
                pcGroup.add(hdd);
            }
        }

        function update3D() {
            build3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // ============================================================
        // 13. АВТОРИЗАЦИЯ
        // ============================================================

        document.getElementById('authBtn').addEventListener('click', function() {
            const email = prompt('Введите email для входа:');
            if (email && email.includes('@')) {
                alert('✅ Добро пожаловать, ' + email);
                this.textContent = '👤 ' + email.split('@')[0];

        });

        // ============================================================
        // 14. ЗАКРЫТИЕ МОДАЛА ПО КЛИКУ СНАРУЖИ
        // ============================================================

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        // 15. СТАРТ
        // ============================================================

        renderCategories();
        renderProducts();
        updateTitle();
        updateStats();
        updateCompatibility();

        setTimeout(init3D, 200);

        console.log('✅ PCBuilder v2.0 загружен!');
        console.log('📦 Категорий: ' + Object.keys(PRODUCTS).length);
        console.log('🛒 Товаров: ' + Object.values(PRODUCTS).reduce((s, a) => s + a.length, 0));
        console.log('🇷🇺 Только Россия и Беларусь');
        console.log('🎮 3D-просмотр, FPS-тест, совместимость');
    </script>

</body>
